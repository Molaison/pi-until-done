name: Publish

# Publishes pi-until-done to npm via OIDC trusted publishing.
# Trust is configured on npm side: srinitude/pi-until-done + this filename.
# No NPM_TOKEN needed; setup-node + --provenance handle OIDC.
#
# Triggers:
#   - Push of a tag matching v*  (the normal release path)
#   - workflow_dispatch with a tag input  (re-run a failed publish)
#
# Gate: the publish job will not run until the CI workflow has succeeded
# on the same SHA. The release-ready step is also re-run inside this job
# as a last local guard before npm publish.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.1). Defaults to current ref."
        required: false

permissions:
  contents: write # required to create the GitHub Release on tag push
  id-token: write # required for OIDC + provenance attestation
  actions: read # required to query other workflow runs

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  wait-for-ci:
    name: Wait for CI to pass on this SHA
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Poll CI workflow until it succeeds
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -e
          for i in $(seq 1 60); do
            data=$(gh run list --repo "$REPO" --commit "$SHA" \
              --workflow ci.yml --json status,conclusion --limit 1 \
              --jq '.[0]')
            if [ -z "$data" ] || [ "$data" = "null" ]; then
              echo "[$i] No CI run yet for $SHA, waiting..."
              sleep 30
              continue
            fi
            status=$(echo "$data" | jq -r '.status')
            conclusion=$(echo "$data" | jq -r '.conclusion // ""')
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "✓ CI succeeded on $SHA"
                exit 0
              fi
              echo "✗ CI did not succeed on $SHA (conclusion=$conclusion)"
              exit 1
            fi
            echo "[$i] CI status=$status, sleeping..."
            sleep 30
          done
          echo "Timed out waiting for CI"
          exit 1

  publish:
    name: npm publish (OIDC + provenance)
    needs: wait-for-ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          version: 2026.5.0
          install: true
          cache: true
          experimental: true

      - name: Trust mise.toml
        run: mise trust

      - name: Install bun deps
        run: mise run install-deps

      - name: Local release-readiness gate (final guard)
        run: mise run release-ready

      # Node 24 ships npm 11.x by default — needed for OIDC trusted
      # publishing (≥ 11.5.1). Self-upgrading older npm hits a known
      # MODULE_NOT_FOUND: promise-retry bug in arborist, so we just pick
      # a node version that already has the right npm.
      # NO registry-url — that injects a placeholder NODE_AUTH_TOKEN and
      # fights the OIDC handshake, returning 404-not-found.
      - name: Set up Node 24 (ships npm 11.x for OIDC trusted publishing)
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify npm version supports OIDC trusted publishing
        run: |
          ver=$(npm --version)
          echo "npm version: $ver"
          node -e "const v=process.argv[1].split('.').map(Number); if(v[0]<11||(v[0]===11&&v[1]<5)){console.error('Need npm >= 11.5.1, have '+process.argv[1]); process.exit(1);}" "$ver"

      - name: Publish to npm with provenance via OIDC
        run: npm publish --provenance --access public

      - name: Resolve release tag
        id: tag
        run: |
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          # github.ref on a tag push is "refs/tags/vX.Y.Z"; ref_name is "vX.Y.Z"
          if [[ "$ref" == refs/tags/* ]]; then ref="${ref#refs/tags/}"; fi
          echo "name=$ref" >> "$GITHUB_OUTPUT"
          echo "Release tag: $ref"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          tag="${{ steps.tag.outputs.name }}"
          version="${tag#v}"
          marker="## [$version]"
          # Pull the section starting at "## [VERSION]" up to the next "## "
          # heading. String-comparison match (not regex) so brackets in the
          # version don't get interpreted as a char-class.
          awk -v marker="$marker" '
            index($0, marker) == 1 { in_sec = 1; print; next }
            in_sec && /^## / { exit }
            in_sec { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Could not extract notes for $version from CHANGELOG.md; falling back to tag annotation."
            git tag -l --format='%(contents)' "$tag" > /tmp/release-notes.md
          fi
          echo "notes-path=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"
          echo "--- release notes preview ---"
          head -40 /tmp/release-notes.md

      - name: Create / update GitHub Release for the tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ steps.tag.outputs.name }}"
          # Idempotent: create if missing, edit if exists. Mark Latest only
          # when the tag is on the default branch's tip lineage (gh handles
          # this automatically via --latest).
          if gh release view "$tag" --json tagName --jq .tagName 2>/dev/null; then
            gh release edit "$tag" \
              --title "$tag" \
              --notes-file "${{ steps.notes.outputs.notes-path }}" \
              --latest
          else
            gh release create "$tag" \
              --title "$tag" \
              --notes-file "${{ steps.notes.outputs.notes-path }}" \
              --latest
          fi
          echo "✓ GitHub Release ready for $tag"
