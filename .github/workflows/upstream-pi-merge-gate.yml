name: Upstream Pi auto-merge gate

# Squash-merges the upstream-pi-bump PR opened by upstream-watch.yml,
# but ONLY when BOTH of these conditions hold on the latest head SHA:
#
#   (a) CI is green — every required check run on the head SHA reports
#       `success` (or `skipped`).
#   (b) CodeRabbit approved — the most recent review from
#       coderabbitai[bot] is in APPROVED state.
#
# Re-evaluated on every CI completion and every new CodeRabbit review,
# so push-fixes converge automatically. Either gate failing keeps the
# PR open.
#
# This is an explicit gate (not GitHub native auto-merge) so the
# enforcement is in this workflow's source, not in branch-protection
# settings. Branch protection can still be configured for defense in
# depth — they don't conflict.

on:
  pull_request_review:
    types: [submitted, edited, dismissed]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to evaluate (defaults to upstream/pi-bump branch)"
        required: false

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: upstream-pi-merge-gate-${{ github.event.pull_request.number || github.event.workflow_run.head_branch || github.event.inputs.pr_number || 'unknown' }}
  cancel-in-progress: false

jobs:
  evaluate-and-merge:
    name: Evaluate gates and merge if green
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Find candidate PR
        id: find
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_PAT || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Pick PR via event or input
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            number="${{ github.event.inputs.pr_number }}"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            number="${{ github.event.pull_request.number }}"
          else
            number=$(gh pr list --head upstream/pi-bump --state open --json number --jq '.[0].number // empty')
          fi
          if [ -z "$number" ]; then
            echo "::notice::No upstream/pi-bump PR open — nothing to evaluate."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pull metadata
          pr_json=$(gh pr view "$number" --json number,headRefName,headRefOid,labels,state,mergeable,baseRefName)
          ref=$(echo "$pr_json" | jq -r .headRefName)
          state=$(echo "$pr_json" | jq -r .state)
          has_label=$(echo "$pr_json" | jq -r '[.labels[].name] | index("auto-merge") != null')
          if [ "$ref" != "upstream/pi-bump" ] || [ "$state" != "OPEN" ] || [ "$has_label" != "true" ]; then
            echo "::notice::PR #$number does not match merge-gate criteria (ref=$ref state=$state has_label=$has_label)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sha=$(echo "$pr_json" | jq -r .headRefOid)
          echo "number=$number" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Gate (a) — CI is green on head SHA
        if: steps.find.outputs.skip != 'true'
        id: ci_gate
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_PAT || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          checks=$(gh api "repos/${{ github.repository }}/commits/${{ steps.find.outputs.sha }}/check-runs?per_page=100" --jq '.check_runs')
          # Exclude THIS workflow's runs from the gate so we don't deadlock on ourselves
          relevant=$(echo "$checks" | jq '[.[] | select(.name | contains("Upstream Pi auto-merge gate") | not)]')
          total=$(echo "$relevant" | jq 'length')
          all_done=$(echo "$relevant" | jq 'all(.[]; .status == "completed")')
          all_passed=$(echo "$relevant" | jq 'all(.[]; .conclusion == "success" or .conclusion == "skipped" or .conclusion == "neutral")')
          echo "head SHA: ${{ steps.find.outputs.sha }}  total checks: $total  all_done: $all_done  all_passed: $all_passed"
          # Require at least 3 completed checks (the matrix) — defends against
          # racing the gate before the CI workflow has registered any check runs.
          if [ "$total" -lt 3 ]; then
            echo "::notice::Only $total check runs registered on head SHA — waiting for the full CI matrix"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$all_done" != "true" ] || [ "$all_passed" != "true" ]; then
            echo "::notice::CI not yet green (all_done=$all_done all_passed=$all_passed)"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Gate (b) — CodeRabbit approved
        if: steps.find.outputs.skip != 'true'
        id: review_gate
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_PAT || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Most recent review from coderabbitai[bot]
          state=$(gh api "repos/${{ github.repository }}/pulls/${{ steps.find.outputs.number }}/reviews" \
            --jq '[.[] | select(.user.login == "coderabbitai[bot]")] | sort_by(.submitted_at) | last | .state // ""')
          echo "CodeRabbit latest review state: ${state:-<none>}"
          if [ "$state" != "APPROVED" ]; then
            echo "::notice::CodeRabbit has not yet posted an APPROVED review (state=${state:-<none>})"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Merge (squash) when both gates are green
        if: |
          steps.find.outputs.skip != 'true' &&
          steps.ci_gate.outputs.ready == 'true' &&
          steps.review_gate.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_PAT || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          echo "::notice title=Both gates green::CI green AND CodeRabbit approved on head SHA ${{ steps.find.outputs.sha }} — squash-merging PR #${{ steps.find.outputs.number }}"
          gh pr merge "${{ steps.find.outputs.number }}" --squash --delete-branch

      - name: Hold (gates not yet satisfied)
        if: |
          steps.find.outputs.skip != 'true' &&
          (steps.ci_gate.outputs.ready != 'true' ||
           steps.review_gate.outputs.ready != 'true')
        run: |
          echo "::notice title=Auto-merge holding::PR #${{ steps.find.outputs.number }} — CI ready: ${{ steps.ci_gate.outputs.ready }}, CodeRabbit ready: ${{ steps.review_gate.outputs.ready }}. Will re-evaluate on next CI completion or review submission."
